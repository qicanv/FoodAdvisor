spring:
  application:
    name: foodadvisor-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/foodadvisor
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false