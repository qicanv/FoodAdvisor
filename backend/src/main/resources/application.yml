spring:
  application:
    name: foodadvisor-backend

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:foodadvisor}?stringtype=unspecified
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
      database: 0
      timeout: 3000ms

server:
  port: ${BACKEND_PORT:8080}

foodadvisor:
  crypto:
    model-key-secret: ${MODEL_KEY_SECRET:foodadvisor-secret-key-2024}
  upload:
    review-image-dir: ${REVIEW_IMAGE_UPLOAD_DIR:uploads/reviews}
  hot-words:
    scheduled:
      # 是否启用热词定时生成任务，默认 true
      enabled: true
    # 单区域最多保留的热词数量，默认 100
    max-words-per-region: 100

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

mybatis-plus:
  type-aliases-package: com.foodadvisor.entity
  mapper-locations: classpath*:/mapper/**/*.xml
  type-handlers-package: com.baomidou.mybatisplus.extension.handlers
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false
    db-config:
      id-type: auto

# AI 服务地址（FastAPI）
ai-service:
  base-url: http://localhost:${AI_SERVICE_PORT:8000}
  internal-token: ${INTERNAL_API_TOKEN:}
  connect-timeout: 5000
  read-timeout: 60000

# 日志
logging:
  level:
    com.foodadvisor: INFO
    org.springframework.web: INFO
    com.baomidou.mybatisplus: DEBUG
    com.foodadvisor.mapper: DEBUG